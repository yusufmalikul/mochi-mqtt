# Deployment config: plaintext TCP for backend clients, wss:// for mobile.
#
# Used by the example docker-compose.yml. Place this (renamed to config.yaml)
# plus a certs/ directory into ./deploy.
listeners:
  # Backend / internal clients connect here over plain TCP (mqtt://host:1993).
  - type: "tcp"
    id: "backend-tcp"
    address: ":1993"

  # Mobile / browser clients connect here over TLS WebSocket
  # (wss://host:1992/mqtt). Remove the tls_* lines to make it plaintext ws://.
  - type: "ws"
    id: "mobile-wss"
    address: ":1992"
    tls_cert_file: "/etc/mochi/certs/cert.pem"
    tls_key_file: "/etc/mochi/certs/key.pem"

# IMPORTANT: do NOT configure any auth hook here (neither `allow_all: true`
# nor an `auth.ledger`). Mochi combines ACL hooks with OR: a subscribe is
# allowed if ANY hook allows it. cmd/docker always registers the
# no-wildcard-sub hook, but any other ACL hook that allows "#" (allow_all, or a
# ledger with a broad filter like "app/#") overrides it and lets wildcards
# through. The no-wildcard-sub hook already permits all connections, so leaving
# the hooks section empty gives open connect + wildcard-blocked subscribe.

options:
  # Required if you enable the clustering bus; harmless otherwise.
  inline_client: true
